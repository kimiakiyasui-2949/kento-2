img{

/* =========================
   TEXT

.text{
    text-decoration:none;
    color:#ffffff;
    font-weight:bold;
    font-size:18px;

    top:12px;

.text-2{

    color:#ffffff;

    font-size:18px;
}

.text-6{
    color:#ffffff;
    text-align:center;
    margin-top:8px;
    font-size:14px;

}

.text-7{
    width:100%;
    text-align:center;
    font-size:22px;
    margin:50px auto 28px;
    color:#ffffff;
    position:relative;
    z-index:10;
}

/* =========================
   MAIN
========================= */

.main{
    width:100%;
    height:auto;
}

.main p{
    color:#ffffff;
    text-align:center;
    margin-bottom:28px;
    font-size:14px;
    letter-spacing:1px;
}

/* =========================
   PHOTO
========================= */

.photo{
    padding-top:24px;
    width:92%;
    max-width:650px;
    height:auto;
    margin:0 auto 20px auto;
    cursor:pointer;
    scroll-margin-top:24px;

    opacity:0;
    transform:translateY(20px);
    transition:
    opacity 1.2s ease,
    transform 1.2s ease;
}

/* =========================
   SLIDER
========================= */

.tikatetu-slider{
    width: 88%;
    max-width:650px;
    margin:24px auto 20px;
    overflow:hidden;

    opacity:0;
    transform:translateY(20px);

    transition:
    opacity 1.2s ease,
    transform 1.2s ease;
}

.tikatetu-track{
    display:flex;
    width:300%;

    animation:tikatetuTrack 12s ease-in-out infinite;
    animation-play-state:paused;
}

.tikatetu-slider.show .tikatetu-track{
    animation-play-state:running;
}

.tikatetu-slide-photo{
    width:33.333%;
    flex-shrink:0;
    cursor:pointer;
    object-fit:cover;
}

/* =========================
   ANIMATION
========================= */

@keyframes tikatetuTrack {

    0%, 28%{
        transform:translateX(0);
    }

    33%, 61%{
        transform:translateX(-33.333%);
    }

    66%, 94%{
        transform:translateX(-66.666%);
    }

    99%, 100%{
        transform:translateX(0);
    }
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* =========================
   FOOTER
========================= */

.site-footer{
    padding:24px 12px 32px;
    color:#ffffff;
    text-align:center;
    font-size:13px;
}

/* =========================
   SMARTPHONE
========================= */

========================= */

        margin-top:80px;

    }

    .tikatetu-slider{

    }
}

</style>
</head>

<!-- =========================
     JAVASCRIPT
========================= -->

<script>

const photos = document.querySelectorAll('.photo');
const tikatetuSlides = document.querySelectorAll('.tikatetu-slide-photo');

photos.forEach((photo, index) => {

    const photoId = `beauty-photo-${index + 1}`;

    photo.id = photoId;

    photo.addEventListener('click', () => {

        const imagePath = photo.getAttribute('src');

        if(!imagePath){
            return;
        }

        window.location.href =
        `beauty-editorial.html?image=${encodeURIComponent(imagePath)}&from=${encodeURIComponent('text.html')}&photo=${encodeURIComponent(photoId)}`;

    });
});

tikatetuSlides.forEach((photo) => {

    photo.addEventListener('click', () => {

        const track = photo.parentElement;
        const siblings = Array.from(track.querySelectorAll('img'));

        const imagePath = photo.getAttribute('src');
        const idx = siblings.indexOf(photo);

        const slides = siblings
        .map((img) => img.getAttribute('src'))
        .join('|');

        window.location.href =
        `beauty-editorial.html?image=${encodeURIComponent(imagePath)}&slides=${encodeURIComponent(slides)}&idx=${idx}&from=${encodeURIComponent('text.html')}`;

    });
});

const observer = new IntersectionObserver(entries => {

    entries.forEach(entry => {

        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }

    });

},{
    threshold:0.2
});

photos.forEach(photo => {
    observer.observe(photo);
});

const tikatetuSliders =
document.querySelectorAll('.tikatetu-slider');

tikatetuSliders.forEach((slider) => {
    observer.observe(slider);
});

</script>
