/* =========================

.text-7{

    position:relative;
    z-index:10;

/* =========================
   MAIN
========================= */

.main{
    width:100%;
    height:auto;
}

.main p{
    color:#ffffff;
    text-align:center;
    margin-bottom:28px;
    font-size:14px;
    letter-spacing:1px;
}

/* =========================
   PHOTO
========================= */

.photo{
    padding-top:24px;
    width:92%;
    max-width:650px;
    height:auto;
    margin:0 auto 20px auto;
    cursor:pointer;
    scroll-margin-top:24px;

    opacity:0;
    transform:translateY(20px);
    transition:
    opacity 1.2s ease,
    transform 1.2s ease;
}

/* =========================
   SLIDER
========================= */

.tikatetu-slider{
    width: 88%;
    max-width:650px;
    margin:24px auto 20px;
    overflow:hidden;

    opacity:0;
    transform:translateY(20px);

    transition:
    opacity 1.2s ease,
    transform 1.2s ease;
}

.tikatetu-track{
    display:flex;
    width:200%;

    animation:tikatetuTrack 10s ease-in-out infinite;
    animation-play-state:paused;
}

.tikatetu-slider.show .tikatetu-track{
    animation-play-state:running;
}

.tikatetu-slide-photo{
    width:50%;
    flex-shrink:0;
    cursor:pointer;
    object-fit:cover;
}

/* =========================
   ANIMATION
========================= */

@keyframes tikatetuTrack {

    0%, 35%{
        transform:translateX(0);
    }

    40%, 85%{
        transform:translateX(-50%);
    }

    90%, 100%{
        transform:translateX(0);
    }
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* =========================
   LIGHTBOX
========================= */

#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    z-index:9999;
    align-items:center;
    justify-content:center;
}

#lightbox.active{
    display:flex;
}

#lightbox img{
    max-width:92vw;
    max-height:90vh;
    object-fit:contain;
    display:block;
}

#lightbox-close{
    position:fixed;
    top:16px;
    right:20px;
    color:#ffffff;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    line-height:1;
    z-index:10000;
    background:none;
    border:none;
    padding:4px 8px;
}

.lightbox-arrow{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.45);
    color:#ffffff;
    border:none;
    font-size:56px;
    line-height:1;
    padding:0 14px;
    cursor:pointer;
    z-index:10000;
    display:none;
}

.lightbox-arrow:hover{
    background:rgba(0,0,0,0.75);
}

#lightbox-prev{ left:0; }
#lightbox-next{ right:0; }

#lightbox.slider-mode .lightbox-arrow{
    display:block;
}

/* =========================
   FOOTER
========================= */

    padding:24px 12px 32px;
    color:#ffffff;
    text-align:center;
    font-size:13px;

<div id="lightbox">

<!-- =========================
     JAVASCRIPT
========================= -->

<script>

const lightbox     = document.getElementById('lightbox');
const lightboxImg  = document.getElementById('lightbox-img');
const lightboxClose= document.getElementById('lightbox-close');
const lightboxPrev = document.getElementById('lightbox-prev');
const lightboxNext = document.getElementById('lightbox-next');

let sliderImages = [];
let sliderIndex  = 0;

function openLightbox(src){
    lightboxImg.src = src;
    lightbox.classList.add('active');
    lightbox.classList.remove('slider-mode');
    document.body.style.overflow = 'hidden';
}

function openSliderLightbox(images, index){
    sliderImages = images;
    sliderIndex  = index;
    lightboxImg.src = sliderImages[sliderIndex];
    lightbox.classList.add('active', 'slider-mode');
    document.body.style.overflow = 'hidden';
}

function closeLightbox(){
    lightbox.classList.remove('active', 'slider-mode');
    lightboxImg.src = '';
    document.body.style.overflow = '';
    sliderImages = [];
}

lightboxClose.addEventListener('click', closeLightbox);

lightboxPrev.addEventListener('click', (e) => {
    e.stopPropagation();
    sliderIndex = (sliderIndex - 1 + sliderImages.length) % sliderImages.length;
    lightboxImg.src = sliderImages[sliderIndex];
});

lightboxNext.addEventListener('click', (e) => {
    e.stopPropagation();
    sliderIndex = (sliderIndex + 1) % sliderImages.length;
    lightboxImg.src = sliderImages[sliderIndex];
});

lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox){
        closeLightbox();
    }
});

document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape'){
        closeLightbox();
    }
    if(sliderImages.length > 0 && e.key === 'ArrowLeft'){
        sliderIndex = (sliderIndex - 1 + sliderImages.length) % sliderImages.length;
        lightboxImg.src = sliderImages[sliderIndex];
    }
    if(sliderImages.length > 0 && e.key === 'ArrowRight'){
        sliderIndex = (sliderIndex + 1) % sliderImages.length;
        lightboxImg.src = sliderImages[sliderIndex];
    }
});

const photos = document.querySelectorAll('.photo');
const tikatetuSlides = document.querySelectorAll('.tikatetu-slide-photo');

photos.forEach((photo) => {

    photo.addEventListener('click', () => {

        const imagePath = photo.getAttribute('src');
        if(!imagePath){ return; }
        openLightbox(imagePath);

    });
});

tikatetuSlides.forEach((photo) => {

    photo.addEventListener('click', () => {

        const track  = photo.closest('.tikatetu-track');
        const imgs   = Array.from(track.querySelectorAll('.tikatetu-slide-photo'));
        const images = imgs.map(img => img.getAttribute('src'));
        const index  = imgs.indexOf(photo);
        openSliderLightbox(images, index);

    });
});

const observer = new IntersectionObserver(entries => {

    entries.forEach(entry => {

        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }

    });

},{
    threshold:0,
    rootMargin:'0px 0px -20px 0px'
});

photos.forEach(photo => {
    observer.observe(photo);
});

const tikatetuSliders =
document.querySelectorAll('.tikatetu-slider');

tikatetuSliders.forEach((slider) => {
    observer.observe(slider);
});

</script>
