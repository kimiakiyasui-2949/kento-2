<!-- ▼ スクロール検知して “show” を付けるJS -->
<script>
  const photos = document.querySelectorAll('.photo');

  photos.forEach((photo, index) => {
      const photoId = `beauty-photo-${index + 1}`;

      photo.id = photoId;

      photo.addEventListener('click', () => {
          const imagePath = photo.getAttribute('src');

          if (!imagePath) {
              return;
          }

          window.location.href = `beauty-editorial.html?image=${encodeURIComponent(imagePath)}&from=${encodeURIComponent('text.html')}&photo=${encodeURIComponent(photoId)}`;
      });
  });

  const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
          if (entry.isIntersecting) {
              entry.target.classList.add('show');
          }
      });
  }, {
      threshold: 0.2
  });

  photos.forEach(photo => {
      observer.observe(photo);
  });
</script>
