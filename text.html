  html, body {

  .text {

  /* ▼ 写真の基本設定 */
  .photo {
    padding-top: 24px;
    width: 90%;     /* ← 86% → 90% に拡大 */
    height: auto;
    max-width: 520px;  /* ← 480px → 少し大きく */
    display: block;
    margin: 0 auto 20px auto;
        cursor: pointer;
        scroll-margin-top: 24px;

    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s ease, transform 1.2s ease;
}

    .tikatetu-slider {
        width: 84%;
        max-width: 560px;
        margin: 24px auto 20px;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .tikatetu-track {
        display: flex;
        width: 300%;
        animation: tikatetuTrack 12s ease-in-out infinite;
        animation-play-state: paused;
    }

    .tikatetu-slider.show .tikatetu-track {
        animation-play-state: running;
    }

    .tikatetu-slide-photo {
        width: 33.333%;
        max-width: none;
        margin: 0;
        padding-top: 0;
        flex-shrink: 0;
        cursor: pointer;
    }

    @keyframes tikatetuTrack {
        0%, 28% { transform: translateX(0); }
        33%, 61% { transform: translateX(-33.333%); }
        66%, 94% { transform: translateX(-66.666%); }
        99%, 100% { transform: translateX(0); }
    }

  /* ▼ スクロールで画面に入ったら表示 */
  .show {
      opacity: 1;
      transform: translateY(0);
  }
 .text-6 {
     color: #ffffff;
    text-align: center;
 }
 .text-7{

 }

 .text-7 + .photo {

 }

        max-width: 650px;  /* ← PC大きく */
            }

<!-- ▼ スクロール検知して “show” を付けるJS -->
<script>
  const photos = document.querySelectorAll('.photo');
    const tikatetuSlides = document.querySelectorAll('.tikatetu-slide-photo');

  photos.forEach((photo, index) => {
      const photoId = `beauty-photo-${index + 1}`;

      photo.id = photoId;

      photo.addEventListener('click', () => {
          const imagePath = photo.getAttribute('src');

          if (!imagePath) {
              return;
          }

          window.location.href = `beauty-editorial.html?image=${encodeURIComponent(imagePath)}&from=${encodeURIComponent('text.html')}&photo=${encodeURIComponent(photoId)}`;
      });
  });

  tikatetuSlides.forEach((photo) => {
      photo.addEventListener('click', () => {
          const track = photo.parentElement;
          const siblings = Array.from(track.querySelectorAll('img'));
          const imagePath = photo.getAttribute('src');
          const idx = siblings.indexOf(photo);
          const slides = siblings.map((img) => img.getAttribute('src')).join('|');

          window.location.href = `beauty-editorial.html?image=${encodeURIComponent(imagePath)}&slides=${encodeURIComponent(slides)}&idx=${idx}&from=${encodeURIComponent('text.html')}`;
      });
  });

  const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
          if (entry.isIntersecting) {
              entry.target.classList.add('show');
          }
      });
  }, {
      threshold: 0.2
  });

  photos.forEach(photo => {
      observer.observe(photo);
  });

        const tikatetuSliders = document.querySelectorAll('.tikatetu-slider');
        tikatetuSliders.forEach((slider) => {
            observer.observe(slider);
        });
</script>
