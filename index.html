<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustubo Kento | Makeup Artist Portfolio</title>
<meta name="description" content="Ustubo Kento（宇坪健人）のメイクアップアーティストポートフォリオ。作品・実績・コンタクト掲載。">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

/* ===== INTRO ===== */
.intro-wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.intro-img{
  position:absolute;
  width:85%;
  max-width:500px;
  opacity:0;
  animation:slideUp 4s ease-in-out forwards;
}

.intro-img.img2{ animation-delay:1s; }
.intro-img.img3{ animation-delay:2s; }

@keyframes slideUp{
  0%{ transform:translateY(100%); opacity:0; }
  30%{ opacity:1; }
  60%{ transform:translateY(0); opacity:1; }
  100%{ transform:translateX(-120%); opacity:0; }
}

.intro-text{
  position:absolute;
  font-size:clamp(20px,6vw,32px);
  opacity:0;
  animation:fadeIn 3s ease 2.5s forwards;
}

.intro-sub{
  position:absolute;
  top:60%;
  font-size:clamp(12px,3.5vw,16px);
  opacity:0;
  animation:fadeIn 3s ease 3s forwards;
}

.scroll{
  position:absolute;
  bottom:5%;
  font-size:12px;
  opacity:0;
  animation:fadeIn 3s ease 3.5s forwards;
}

@keyframes fadeIn{
  to{ opacity:1; }
}

/* ===== NAV ===== */
.menu{
  position:fixed;
  top:10px;
  left:10px;
  font-size:14px;
  text-decoration:none;
  color:white;
  z-index:100;
}

/* ===== CONTENT ===== */
.work{
  text-align:center;
  font-size:22px;
  margin:30px 0;
}

.main{
  width:100%;
  padding:0 10px;
}

.main p{
  text-align:center;
  font-size:14px;
  margin-bottom:10px;
}

.photo{
  width:100%;
  max-width:600px;
  display:block;
  margin:0 auto 20px;
  cursor:default;
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.photo.show{
  opacity:1;
  transform:translateY(0);
}

.photo-small{
  width:82%;
  max-width:480px;
}

.art-slider{
  position:relative;
  width:82%;
  max-width:480px;
  aspect-ratio:2 / 3;
  margin:0 auto 20px;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  transition: 0.5es;
}

.art-slider.show{
  opacity:1;
  transform:translateY(0);
}

.art-track{
  display:flex;
  width:300%;
  height:100%;
  animation:wiliTrack 12s ease-in-out infinite;
  animation-play-state:paused;
}

.art-slider.show .art-track{
  animation-play-state:running;
}

.art-slide-photo{
  width:33.333%;
  height:100%;
  object-fit:contain;
  cursor:pointer;
  display:block;
  flex-shrink:0;
}

.show-slider{
  position:relative;
  width:88%;
  max-width:600px;
  aspect-ratio:2 / 3;
  margin:0 auto 20px;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.show-slider.show{
  opacity:1;
  transform:translateY(0);
}

.show-track{
  display:flex;
  width:300%;
  height:100%;
  animation:wiliTrack 12s ease-in-out infinite;
  animation-play-state:paused;
}

.show-slider.show .show-track{
  animation-play-state:running;
}

.show-slide-photo{
  width:33.333%;
  height:100%;
  object-fit:contain;
  cursor:pointer;
  display:block;
  flex-shrink:0;
}

.wili-slider{
  position:relative;
  width:88%;
  max-width:600px;
  aspect-ratio:2 / 3;
  margin:0 auto 20px;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.wili-slider.show{
  opacity:1;
  transform:translateY(0);
}

.wili-track{
  display:flex;
  width:300%;
  height:100%;
  animation:wiliTrack 12s ease-in-out infinite;
  animation-play-state:paused;
}

.wili-slider.show .wili-track{
  animation-play-state:running;
}

.wili-slide-photo{
  width:33.333%;
  height:100%;
  object-fit:contain;
  cursor:pointer;
  display:block;
  flex-shrink:0;
}

@keyframes wiliTrack{
  0%, 28%  { transform:translateX(0); }
  33%, 61% { transform:translateX(-33.333%); }
  66%, 94% { transform:translateX(-66.666%); }
  99%, 100%{ transform:translateX(0); }
}

/* ===== PC ===== */
@media(min-width:768px){

  .main{
    max-width:900px;
    margin:auto;
  }

  .work{
    font-size:28px;
  }

  .main p{
    font-size:16px;
  }

}

footer{
  text-align:center;
  font-size:12px;
  padding:20px;
}

</style>
</head>

<body>

<div class="intro-wrapper">
  <img src="road.jpg" class="intro-img img1">
  <img src="snow-2.jpg" class="intro-img img2">
  <img src="street-1.jpg" class="intro-img img3">

  <div class="intro-text">UTSUBO KENTO</div>
  <div class="intro-sub">Photographer</div>
  <div class="scroll">↓ scroll</div>
</div>

<a href="manu.html" class="menu">menu</a>

<div class="work">WORK</div>

<section class="main">

  <p>Kent's Worldwide Photo Collection</p>

  <img src="110st newyork.jpg" 
  class="photo"><p>text</p>


      <img src="art.jpg" 
      class="photo"><p>text</p>

      

  
    <div class="show-slider">
    <div class="show-track">
      <img src="aunt1.jpg" class="show-slide-photo">
      <img src="beach.jpg" class="show-slide-photo">
      <img src="subeay2.jpg" class="show-slide-photo">
    </div>
  </div><p>text</p>
  
  <img src="black.jpg" 
      class="photo"><p>text</p>




    



  
  


</section>

<script>
const photos=document.querySelectorAll('.photo');
const allPhotoSrcs=Array.from(photos).map((photo)=>photo.getAttribute('src'));

photos.forEach((photo)=>{
  photo.addEventListener('click',()=>{
    const src=photo.getAttribute('src');
    const idx=allPhotoSrcs.indexOf(src);
    const slides=allPhotoSrcs.join('|');
    window.location.href=`beauty-editorial.html?image=${encodeURIComponent(src)}&slides=${encodeURIComponent(slides)}&idx=${idx}`;
  });
});

document.querySelectorAll('.art-slide-photo, .show-slide-photo, .wili-slide-photo').forEach((photo)=>{
  photo.addEventListener('click',()=>{
    const src=photo.getAttribute('src');
    const track=photo.parentElement;
    const siblings=Array.from(track.querySelectorAll('img'));
    const idx=siblings.indexOf(photo);
    const slides=siblings.map((img)=>img.getAttribute('src')).join('|');
    window.location.href=`beauty-editorial.html?image=${encodeURIComponent(src)}&slides=${encodeURIComponent(slides)}&idx=${idx}`;
  });
});

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:0.2});

photos.forEach(p=>observer.observe(p));
const artSlider=document.querySelector('.art-slider');
if(artSlider) observer.observe(artSlider);
const showSlider=document.querySelector('.show-slider');
if(showSlider) observer.observe(showSlider);
const wiliSlider=document.querySelector('.wili-slider');
if(wiliSlider) observer.observe(wiliSlider);
</script>

<footer>©Kimiaki Yasui</footer>

</body>
</html>
