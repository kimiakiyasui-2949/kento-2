<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustubo Kento | Makeup Artist Portfolio</title>
<meta name="description" content="Ustubo Kento（宇坪健人）のメイクアップアーティストポートフォリオ。作品・実績・コンタクト掲載。">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

/* ===== INTRO ===== */
.intro-wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.intro-img{
  position:absolute;
  width:85%;
  max-width:500px;
  opacity:0;
  animation:slideUp 4s ease-in-out forwards;
}

.intro-img.img2{ animation-delay:1s; }
.intro-img.img3{ animation-delay:2s; }

@keyframes slideUp{
  0%{ transform:translateY(100%); opacity:0; }
  30%{ opacity:1; }
  60%{ transform:translateY(0); opacity:1; }
  100%{ transform:translateX(-120%); opacity:0; }
}

.intro-text{
  position:absolute;
  font-size:clamp(20px,6vw,32px);
  opacity:0;
  animation:fadeIn 3s ease 2.5s forwards;
}

.intro-sub{
  position:absolute;
  top:60%;
  font-size:clamp(12px,3.5vw,16px);
  opacity:0;
  animation:fadeIn 3s ease 3s forwards;
}

.scroll{
  position:absolute;
  bottom:5%;
  font-size:12px;
  opacity:0;
  animation:fadeIn 3s ease 3.5s forwards;
}

@keyframes fadeIn{
  to{ opacity:1; }
}

/* ===== NAV ===== */
.menu{
  position:fixed;
  top:10px;
  left:10px;
  font-size:14px;
  text-decoration:none;
  color:white;
  z-index:100;
}

/* ===== CONTENT ===== */
.work{
  text-align:center;
  font-size:22px;
  margin:30px 0;
}

.main{
  width:100%;
  padding:0 10px;
}

.main p{
  text-align:center;
  font-size:14px;
  margin-bottom:10px;
}

.photo{
  width:100%;
  max-width:600px;
  display:block;
  margin:0 auto 20px;
  cursor:default;
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.photo.show{
  opacity:1;
  transform:translateY(0);
}

/* ===== PC ===== */
@media(min-width:768px){

  .main{
    max-width:900px;
    margin:auto;
  }

  .work{
    font-size:28px;
  }

  .main p{
    font-size:16px;
  }

}

footer{
  text-align:center;
  font-size:12px;
  padding:20px;
}

</style>
</head>

<body>

<div class="intro-wrapper">
  <img src="road.jpg" class="intro-img img1">
  <img src="snow-2.jpg" class="intro-img img2">
  <img src="street-1.jpg" class="intro-img img3">

  <div class="intro-text">UTSUBO KENTO</div>
  <div class="intro-sub">Photographer</div>
  <div class="scroll">↓ scroll</div>
</div>

<a href="manu.html" class="menu">menu</a>

<div class="work">WORK</div>

<section class="main">

  <p>Kent's Worldwide Photo Collection</p>

  <img src="110st newyork.jpg" class="photo"><p>text</p>
  <img src="art.jpg" class="photo"><p>text</p>
  <img src="black.jpg" class="photo"><p>text</p>
  <img src="show.jpg" class="photo"><p>text</p>

  <p>Original work</p>

  <img src="aunt1.jpg" class="photo"><p>text</p>
  <img src="bluesky.jpg" class="photo"><p>text</p>
  <img src="tika.jpg" class="photo"><p>text</p>
  <img src="wiliamsburg.jpg" class="photo"><p>text</p>

</section>

<script>
const photos=document.querySelectorAll('.photo');

photos.forEach((photo,index)=>{
  photo.addEventListener('click',()=>{
    const src=photo.getAttribute('src');
    window.location.href=`beauty-editorial.html?image=${encodeURIComponent(src)}`;
  });
});

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:0.2});

photos.forEach(p=>observer.observe(p));
</script>

<footer>©Kimiaki Yasui</footer>

</body>
</html>
