<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title><title><title>Ustubo Kento | Makeup Artist Portfolio</title>


  <style>
    body{
      margin:0;
      padding-top: 10px;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      overflow-y: auto; /* スクロール有効化 */
    }

    .text{
      text-decoration: none;
      color: black;
      font-weight: bold;
      font-size: 14px;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
    }

    footer{
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background-color: black;
      color: rgb(243, 242, 241);
      padding: 12px;
      text-align: center;
      font-size: 13px;
      z-index: 1000;
    }

    /* ===== 左下固定フォーム ===== */
    .contact-form{
      position: fixed;
      left: 10px;
      bottom: 70px;
      background: #fff;
      padding: 12px;
      width: 220px;
      font-size: 12px;
    }

    .contact-form h3{
      margin: 0 0 8px;
      font-size: 13px;
    }

    .contact-form input,
    .contact-form textarea{
      width: 100%;
      margin-bottom: 6px;
      padding: 6px;
      font-size: 12px;
    }

    .contact-form button{
      width: 100%;
      padding: 6px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .contact-form button:hover{
      opacity: 0.8;
    }
  </style>
</head>

<body>

<a href="manu.html" class="text">manu</a>

<h2 style="margin-left: 9px;">Contact</h2>

<form
  class="contact-form"
  action="https://formspree.io/f/xjgqbwnk"
  method="POST"
>
  <h3>Contact</h3>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="message" rows="3" placeholder="Message" required></textarea>
  <button type="submit">Send</button>
</form>

<footer>© 2026 Kimiaki Yasui. All Rights Reserved.</footer>

</body>
</html>
